<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay Settings</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <form id="settingsPanel" class="settings-panel">
      <header class="panel-header">
        <strong>Overlay 設定</strong>
        <button id="closeButton" type="button" title="Close">×</button>
      </header>

      <div class="settings-grid">
        <label>主要文字顏色 <input id="textColorInput" type="color" /></label>
        <label>次要文字顏色 <input id="inactiveTextColorInput" type="color" /></label>
        <label>背景顏色 <input id="backgroundColorInput" type="color" /></label>
        <label>強調顏色 <input id="accentColorInput" type="color" /></label>
        <label>邊框顏色 <input id="borderColorInput" type="color" /></label>
        <label>透明度 <input id="opacityInput" type="range" min="0.05" max="1" step="0.02" /></label>
        <label>字體大小 <input id="fontSizeInput" type="range" min="18" max="72" step="1" /></label>
        <label>前後句比例 <input id="adjacentScaleInput" type="range" min="0.42" max="0.9" step="0.01" /></label>
        <label>背景模糊 <input id="blurInput" type="range" min="0" max="36" step="1" /></label>
        <label>文字陰影 <input id="shadowInput" type="range" min="0" max="100" step="1" /></label>
        <label>圓角 <input id="radiusInput" type="range" min="0" max="28" step="1" /></label>
        <label>行距 <input id="lineGapInput" type="range" min="2" max="30" step="1" /></label>
        <label>上下內距 <input id="verticalPaddingInput" type="range" min="6" max="56" step="1" /></label>
        <label>左右內距 <input id="horizontalPaddingInput" type="range" min="10" max="80" step="1" /></label>
      </div>

      <div class="checks">
        <label><input id="adjacentInput" type="checkbox" /> 顯示前後句</label>
        <label><input id="lockedInput" type="checkbox" /> 鎖定大小</label>
        <label><input id="clickInput" type="checkbox" /> 點擊穿透</label>
        <label><input id="hoverBackgroundInput" type="checkbox" /> 背景滑過才顯示</label>
      </div>
    </form>
    <script src="./settings.js"></script>
  </body>
</html>
