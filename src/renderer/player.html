<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Music Overlay</title>
    <link rel="stylesheet" href="./player.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="brand">
        <span class="mark"></span>
        <div>
          <strong>YT Music Overlay</strong>
          <small id="statusText">Waiting for YouTube Music...</small>
        </div>
      </div>
      <nav>
        <button id="backButton" class="icon-nav" title="Back" type="button" data-i18n-title="back">&#8249;</button>
        <button id="forwardButton" class="icon-nav" title="Forward" type="button" data-i18n-title="forward">&#8250;</button>
        <button id="reloadButton" class="icon-nav" title="Reload" type="button" data-i18n-title="reload">&#8635;</button>
        <button id="copyLyricsPromptButton" class="icon-nav prompt-copy" title="Copy lyrics search prompt" type="button" data-i18n-title="copyLyricsPrompt" aria-label="Copy lyrics search prompt">
          <span class="prompt-icon" aria-hidden="true">AI</span>
        </button>
        <button id="lyricsPromptSettingsButton" class="icon-nav prompt-settings" title="Lyrics search settings" type="button" data-i18n-title="lyricsPromptSettings" aria-label="Lyrics search settings">
          <span class="prompt-settings-icon" aria-hidden="true">&#9881;</span>
        </button>
        <button id="debugExportButton" class="icon-nav debug-export" title="Export debug state" type="button" data-i18n-title="exportDebug" aria-label="Export debug state">
          <span class="debug-icon" aria-hidden="true"></span>
        </button>
        <label class="overlay-switch" title="Toggle overlay" data-i18n-title="toggleOverlay">
          <input id="overlayToggle" type="checkbox" checked />
          <span class="switch-track"><span class="switch-thumb"></span></span>
          <span class="switch-label" data-i18n="overlay">Overlay</span>
        </label>
      </nav>
    </header>
    <script src="./player.js"></script>
  </body>
</html>
