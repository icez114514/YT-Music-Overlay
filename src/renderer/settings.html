<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay Settings</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <form id="settingsPanel" class="settings-panel">
      <header class="panel-header">
        <strong data-i18n="settingsTitle">Overlay Settings</strong>
        <button id="closeButton" type="button" title="Close" data-i18n-title="close">x</button>
      </header>

      <div class="settings-grid">
        <label><span data-i18n="textColor">Text color</span><input id="textColorInput" type="color" /></label>
        <label><span data-i18n="inactiveTextColor">Inactive text</span><input id="inactiveTextColorInput" type="color" /></label>
        <label><span data-i18n="backgroundColor">Background</span><input id="backgroundColorInput" type="color" /></label>
        <label><span data-i18n="accentColor">Accent</span><input id="accentColorInput" type="color" /></label>
        <label><span data-i18n="borderColor">Border</span><input id="borderColorInput" type="color" /></label>
        <label><span data-i18n="opacity">Opacity</span><input id="opacityInput" type="range" min="0" max="1" step="0.02" /></label>
        <label><span data-i18n="fontSize">Font size</span><input id="fontSizeInput" type="range" min="18" max="72" step="1" /></label>
        <label><span data-i18n="adjacentScale">Adjacent scale</span><input id="adjacentScaleInput" type="range" min="0.42" max="0.9" step="0.01" /></label>
        <label><span data-i18n="blur">Blur</span><input id="blurInput" type="range" min="0" max="36" step="1" /></label>
        <label><span data-i18n="shadow">Shadow</span><input id="shadowInput" type="range" min="0" max="100" step="1" /></label>
        <label><span data-i18n="radius">Radius</span><input id="radiusInput" type="range" min="0" max="28" step="1" /></label>
        <label><span data-i18n="lineGap">Line gap</span><input id="lineGapInput" type="range" min="2" max="30" step="1" /></label>
        <label><span data-i18n="verticalPadding">Vertical padding</span><input id="verticalPaddingInput" type="range" min="6" max="56" step="1" /></label>
        <label><span data-i18n="horizontalPadding">Horizontal padding</span><input id="horizontalPaddingInput" type="range" min="10" max="80" step="1" /></label>
      </div>

      <div class="checks">
        <label><input id="adjacentInput" type="checkbox" /> <span data-i18n="showAdjacent">Show adjacent lines</span></label>
        <label><input id="lockedInput" type="checkbox" /> <span data-i18n="lockSize">Lock size</span></label>
        <label><input id="hoverBackgroundInput" type="checkbox" /> <span data-i18n="hoverBackground">Show background on hover</span></label>
        <label class="wide-check"><input id="chineseInterfaceInput" type="checkbox" /> <span data-i18n="chineseInterface">中文介面</span></label>
      </div>
    </form>
    <script src="./settings.js"></script>
  </body>
</html>
